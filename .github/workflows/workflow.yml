name: Daily Money Forward CSV Sync (uv version)

on:
  schedule:
    # 毎日日本時間の午前3:00（UTC 18:00）に自動実行
    - cron: '0 18 * * *'
  workflow_dispatch: # 手動実行ボタンも有効化

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up uv
      uses: astral-sh/setup-uv@v5
      with:
        enable-cache: true

    - name: Set up Python
      run: uv python install 3.11

    - name: Install Playwright Browsers
      run: uv run playwright install chromium --with-deps

    - name: Run sync script
      env:
        MF_ID: ${{ secrets.MF_ID }}
        MF_PW: ${{ secrets.MF_PW }}
        GOOGLE_TOKEN_JSON: ${{ secrets.GOOGLE_TOKEN_JSON }}
        DRIVE_FILE_ID: ${{ secrets.DRIVE_FILE_ID }}
      run: |
        uv run --with playwright \
               --with google-api-python-client \
               --with google-auth-oauthlib \
               --with google-auth-httplib2 \
               script.py
